<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vangraph</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
  <script src="https://unpkg.com/@ffmpeg/util@0.11.0/dist/util.min.js"></script>
</head>
<body>
  <header>
    <h1>Vangraph</h1>
    <p>Открытый видеохостинг на GitHub Pages</p>
  </header>

  <main id="app">
    <div id="loader" class="loader">Загрузка каталога...</div>
    <div id="error" class="error hidden"></div>
    <div id="content" class="hidden"></div>
  </main>

  <dialog id="videoModal">
    <div class="modal-header">
      <h2 id="modalTitle">Видео</h2>
      <button id="closeModal" aria-label="Закрыть">✕</button>
    </div>
    <div class="modal-video">
      <video id="player" controls playsinline preload="metadata"></video>
      <canvas id="ffmpegCanvas" class="hidden" style="width:100%;display:block;"></canvas>
    </div>
    <p id="modalInfo" class="modal-info"></p>
    <p id="transcodeStatus" class="modal-info hidden">⏳ Конвертация для вашего браузера... Не закрывайте вкладку.</p>
  </dialog>

  <footer>
    <p>Vangraph &copy; 2024 | Работает на GitHub Pages</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
